

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>실시간 한 줄 방명록</title>

  <style>
    /* 기본 설정 */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 40px 20px;
      background: #f4f5f7;
      color: #202124;
      font-family:
        Pretendard,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    /* 전체 컨테이너 */
    .container {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    }

    /* 헤더 */
    .header {
      margin-bottom: 22px;
      text-align: center;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .header p {
      margin: 0;
      color: #777;
      font-size: 15px;
    }

    /* 카드 */
    .card {
      margin-bottom: 18px;
      padding: 24px;
      border: 1px solid #e1e3e6;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    /* 로그인 영역 */
    .auth-area {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-button {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 20px;
      border: 1px solid #dadce0;
      border-radius: 10px;
      background: #fff;
      color: #303134;
      font-weight: 600;
      transition:
        background 0.2s,
        box-shadow 0.2s;
    }

    .login-button:hover {
      background: #f8f9fa;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    /* 로그인한 사용자 영역 */
    .user-panel {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .user-info {
      min-width: 0;
    }

    .welcome-text {
      margin: 0 0 4px;
      color: #777;
      font-size: 13px;
    }

    .user-name {
      overflow: hidden;
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .logout-button {
      flex-shrink: 0;
      padding: 9px 14px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background: #f8f9fa;
      color: #555;
    }

    .logout-button:hover {
      background: #eceff1;
    }

    /* 입력 폼 */
    .guestbook-form {
      display: none;
      gap: 10px;
    }

    .message-input {
      flex: 1;
      min-width: 0;
      height: 46px;
      padding: 0 15px;
      border: 1px solid #d7d9dc;
      border-radius: 10px;
      outline: none;
      background: #fff;
      transition:
        border-color 0.2s,
        box-shadow 0.2s;
    }

    .message-input:focus {
      border-color: #777;
      box-shadow: 0 0 0 3px rgba(100, 100, 100, 0.1);
    }

    .message-input::placeholder {
      color: #aaa;
    }

    .submit-button {
      flex-shrink: 0;
      min-width: 82px;
      height: 46px;
      padding: 0 18px;
      border: 0;
      border-radius: 10px;
      background: #303134;
      color: #fff;
      font-weight: 700;
      transition:
        background 0.2s,
        transform 0.1s;
    }

    .submit-button:hover {
      background: #111;
    }

    .submit-button:active {
      transform: translateY(1px);
    }

    .submit-button:disabled {
      cursor: not-allowed;
      background: #aaa;
    }

    /* 방명록 목록 */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .list-header h2 {
      margin: 0;
      font-size: 19px;
    }

    .count {
      color: #888;
      font-size: 14px;
    }

    .guestbook-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .guestbook-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid #eceef0;
      border-radius: 10px;
      background: #fafafa;
    }

    .author {
      flex: 0 0 110px;
      overflow: hidden;
      color: #333;
      font-size: 14px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .message {
      flex: 1;
      min-width: 0;
      overflow-wrap: anywhere;
      color: #555;
      font-size: 15px;
      line-height: 1.5;
    }

    .created-at {
      flex-shrink: 0;
      color: #999;
      font-size: 12px;
      white-space: nowrap;
    }

    .empty-message,
    .loading-message {
      padding: 34px 15px;
      color: #999;
      text-align: center;
    }

    /* 상태 메시지 */
    .status-message {
      display: none;
      margin: 12px 0 0;
      color: #666;
      font-size: 13px;
      text-align: center;
    }

    .status-message.error {
      color: #c62828;
    }

    /* 모바일 화면 */
    @media (max-width: 600px) {
      body {
        padding: 24px 14px;
      }

      .card {
        padding: 18px;
        border-radius: 14px;
      }

      .header h1 {
        font-size: 25px;
      }

      .guestbook-form {
        flex-direction: column;
      }

      .submit-button {
        width: 100%;
      }

      .guestbook-item {
        display: block;
      }

      .author {
        margin-bottom: 5px;
      }

      .created-at {
        display: block;
        margin-top: 7px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <header class="header">
      <h1>실시간 한 줄 방명록</h1>
      <p>구글 계정으로 로그인하고 한 줄 메시지를 남겨보세요.</p>
    </header>

    <!-- 로그인 영역 -->
    <section class="card">
      <div id="loggedOutArea" class="auth-area">
        <button id="loginButton" class="login-button" type="button">
          <svg
            class="google-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              fill="#4285F4"
              d="M21.35 12.18c0-.74-.07-1.45-.19-2.13H12v4.03h5.24a4.48 4.48 0 0 1-1.94 2.94v2.61h3.14c1.84-1.69 2.91-4.19 2.91-7.45Z"
            />
            <path
              fill="#34A853"
              d="M12 21.7c2.62 0 4.82-.87 6.43-2.36l-3.14-2.61c-.87.58-1.98.93-3.29.93-2.53 0-4.67-1.71-5.44-4.01H3.32v2.7A9.71 9.71 0 0 0 12 21.7Z"
            />
            <path
              fill="#FBBC05"
              d="M6.56 13.65A5.83 5.83 0 0 1 6.25 12c0-.57.1-1.13.31-1.65v-2.7H3.32A9.7 9.7 0 0 0 2.3 12c0 1.56.37 3.04 1.02 4.35l3.24-2.7Z"
            />
            <path
              fill="#EA4335"
              d="M12 6.34c1.42 0 2.7.49 3.71 1.45l2.78-2.78A9.31 9.31 0 0 0 12 2.3a9.71 9.71 0 0 0-8.68 5.35l3.24 2.7c.77-2.3 2.91-4.01 5.44-4.01Z"
            />
          </svg>

          구글 계정으로 로그인하기
        </button>
      </div>

      <div id="loggedInArea" class="user-panel">
        <div class="user-info">
          <p class="welcome-text">로그인한 사용자</p>
          <p id="userName" class="user-name"></p>
        </div>

        <button id="logoutButton" class="logout-button" type="button">
          로그아웃
        </button>
      </div>

      <p id="statusMessage" class="status-message"></p>
    </section>

    <!-- 입력 영역: 로그인 전에는 숨김 -->
    <section id="formCard" class="card" hidden>
      <form id="guestbookForm" class="guestbook-form">
        <input
          id="messageInput"
          class="message-input"
          type="text"
          maxlength="200"
          placeholder="한 줄 메시지를 입력하세요."
          autocomplete="off"
          required
        />

        <button id="submitButton" class="submit-button" type="submit">
          등록
        </button>
      </form>
    </section>

    <!-- 실시간 방명록 목록 -->
    <section class="card">
      <div class="list-header">
        <h2>방명록</h2>
        <span id="guestbookCount" class="count">0개</span>
      </div>

      <ul id="guestbookList" class="guestbook-list">
        <li class="loading-message">방명록을 불러오는 중입니다.</li>
      </ul>
    </section>
  </main>

  <script type="module">
    /* Firebase SDK v12.15.0
       Firebase v10 이상의 모듈형 CDN 방식입니다. */

    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";


    /* =====================================================
       Firebase 콘솔에서 받은 설정값을 직접 입력하세요.
       ===================================================== */
  const firebaseConfig = {
  apiKey: "AIzaSyDkHRZCiTj-4Vt84ctiPgeFHXhQ2VnvcLc",
  authDomain: "sonice2026-deb80.firebaseapp.com",
  projectId: "sonice2026-deb80",
  storageBucket: "sonice2026-deb80.firebasestorage.app",
  messagingSenderId: "811157878265",
  appId: "1:811157878265:web:964e0359630dca3410b928",
  measurementId: "G-2DTFW8C2V4"
};



    /* Firebase 초기화 */
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();


    /* HTML 요소 */
    const loggedOutArea = document.getElementById("loggedOutArea");
    const loggedInArea = document.getElementById("loggedInArea");
    const loginButton = document.getElementById("loginButton");
    const logoutButton = document.getElementById("logoutButton");
    const userName = document.getElementById("userName");

    const formCard = document.getElementById("formCard");
    const guestbookForm = document.getElementById("guestbookForm");
    const messageInput = document.getElementById("messageInput");
    const submitButton = document.getElementById("submitButton");

    const guestbookList = document.getElementById("guestbookList");
    const guestbookCount = document.getElementById("guestbookCount");
    const statusMessage = document.getElementById("statusMessage");


    /* 상태 메시지 출력 */
    function showStatus(message, isError = false) {
      statusMessage.textContent = message;
      statusMessage.classList.toggle("error", isError);
      statusMessage.style.display = message ? "block" : "none";
    }


    /* Google 로그인 */
    loginButton.addEventListener("click", async () => {
      try {
        loginButton.disabled = true;
        showStatus("구글 로그인을 진행하고 있습니다.");

        await signInWithPopup(auth, googleProvider);

        showStatus("");
      } catch (error) {
        console.error("로그인 오류:", error);

        let message = "로그인 중 오류가 발생했습니다.";

        if (error.code === "auth/popup-closed-by-user") {
          message = "로그인 창이 닫혔습니다.";
        } else if (error.code === "auth/popup-blocked") {
          message = "브라우저에서 로그인 팝업이 차단되었습니다.";
        } else if (error.code === "auth/unauthorized-domain") {
          message =
            "현재 도메인이 Firebase 승인된 도메인에 등록되지 않았습니다.";
        }

        showStatus(message, true);
      } finally {
        loginButton.disabled = false;
      }
    });


    /* 로그아웃 */
    logoutButton.addEventListener("click", async () => {
      try {
        logoutButton.disabled = true;
        await signOut(auth);
        showStatus("");
      } catch (error) {
        console.error("로그아웃 오류:", error);
        showStatus("로그아웃 중 오류가 발생했습니다.", true);
      } finally {
        logoutButton.disabled = false;
      }
    });


    /* 로그인 상태 감지 */
    onAuthStateChanged(auth, (user) => {
      if (user) {
        const displayName = user.displayName || "이름 없는 사용자";

        userName.textContent = displayName;

        loggedOutArea.style.display = "none";
        loggedInArea.style.display = "flex";

        formCard.hidden = false;
        guestbookForm.style.display = "flex";

        messageInput.focus();
      } else {
        userName.textContent = "";

        loggedOutArea.style.display = "flex";
        loggedInArea.style.display = "none";

        formCard.hidden = true;
        guestbookForm.style.display = "none";
        guestbookForm.reset();
      }
    });


    /* 방명록 등록 */
    guestbookForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const currentUser = auth.currentUser;
      const message = messageInput.value.trim();

      if (!currentUser) {
        showStatus("방명록을 작성하려면 먼저 로그인해야 합니다.", true);
        return;
      }

      if (!message) {
        showStatus("메시지를 입력해 주세요.", true);
        messageInput.focus();
        return;
      }

      if (message.length > 200) {
        showStatus("메시지는 200자 이하로 입력해 주세요.", true);
        return;
      }

      try {
        submitButton.disabled = true;
        submitButton.textContent = "등록 중";

        await addDoc(collection(db, "guestbook"), {
          author: currentUser.displayName || "이름 없는 사용자",
          message: message,
          createdAt: serverTimestamp()
        });

        guestbookForm.reset();
        showStatus("");
        messageInput.focus();
      } catch (error) {
        console.error("방명록 등록 오류:", error);
        showStatus(
          "방명록을 등록하지 못했습니다. Firestore 설정과 보안 규칙을 확인해 주세요.",
          true
        );
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "등록";
      }
    });


    /* 날짜 표시 형식 */
    function formatDate(timestamp) {
      if (!timestamp) {
        return "방금 전";
      }

      return timestamp.toDate().toLocaleString("ko-KR", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }


    /* 안전하게 텍스트 요소 생성 */
    function createTextElement(tagName, className, text) {
      const element = document.createElement(tagName);
      element.className = className;
      element.textContent = text;
      return element;
    }


    /* Firestore 실시간 목록 감지
       createdAt 기준 최신 글이 위에 표시됩니다. */
    const guestbookQuery = query(
      collection(db, "guestbook"),
      orderBy("createdAt", "desc")
    );

    onSnapshot(
      guestbookQuery,

      (snapshot) => {
        guestbookList.replaceChildren();
        guestbookCount.textContent = `${snapshot.size}개`;

        if (snapshot.empty) {
          const emptyItem = createTextElement(
            "li",
            "empty-message",
            "아직 등록된 방명록이 없습니다."
          );

          guestbookList.appendChild(emptyItem);
          return;
        }

        snapshot.forEach((documentSnapshot) => {
          const data = documentSnapshot.data();

          const listItem = document.createElement("li");
          listItem.className = "guestbook-item";

          const authorElement = createTextElement(
            "span",
            "author",
            data.author || "이름 없음"
          );

          const messageElement = createTextElement(
            "span",
            "message",
            data.message || ""
          );

          const dateElement = createTextElement(
            "time",
            "created-at",
            formatDate(data.createdAt)
          );

          listItem.append(
            authorElement,
            messageElement,
            dateElement
          );

          guestbookList.appendChild(listItem);
        });
      },

      (error) => {
        console.error("실시간 목록 조회 오류:", error);

        guestbookCount.textContent = "0개";
        guestbookList.replaceChildren();

        const errorItem = createTextElement(
          "li",
          "empty-message",
          "방명록을 불러오지 못했습니다. Firestore 설정을 확인해 주세요."
        );

        guestbookList.appendChild(errorItem);
      }
    );
  </script>
</body>
</html>
